<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>가장 좋아하는 마법은</title>
<meta name="description" content="검은 밤에 타이핑하다가 주문을 완성하면 꽃밭이 피어나는 인터랙티브 웹" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a0c;
    overflow: hidden;
    font-family: "Noto Serif KR", "Nanum Myeongjo", "Apple SD Gothic Neo", serif;
    -webkit-tap-highlight-color: transparent;
  }
  #garden {
    position: fixed;
    inset: 0;
    height: 100dvh;
    background: #0a0a0c;
    overflow: hidden;
    cursor: text;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  #hint {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 0.08em;
    transition: opacity 0.8s;
    pointer-events: none;
    padding: 0 24px;
    line-height: 1.7;
  }
  #textLayer {
    position: absolute;
    left: clamp(20px, 6vw, 64px);
    right: clamp(20px, 6vw, 64px);
    top: 40%;
    transform: translateY(-50%);
    font-size: clamp(26px, 6vw, 46px);
    line-height: 2.1;
    color: #ffffff;
    font-weight: 400;
    word-break: break-all;
    white-space: pre-wrap;
    z-index: 2;
    transition: top 0.25s ease;
  }
  #meadowLayer, #flowerLayer, #sparkLayer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  #meadowLayer { z-index: 1; }
  #flowerLayer { z-index: 3; }
  #sparkLayer  { z-index: 4; }
  #hiddenInput {
    position: fixed;
    top: 0;
    left: 0;
    width: 1px;
    height: 1px;
    opacity: 0.01;
    border: none;
    outline: none;
    background: transparent;
    color: transparent;
    caret-color: transparent;
    font-size: 16px;
  }
  #caret {
    display: inline-block;
    width: 3px;
    height: 0.95em;
    background: #fff;
    vertical-align: -0.12em;
    animation: blink 1.1s step-end infinite;
  }
  .fl {
    position: absolute;
    animation: sway 3.5s ease-in-out infinite;
    transform-origin: bottom center;
    will-change: transform;
  }
  .fl svg .stemG {
    transform-origin: center bottom;
    animation: growStem 0.5s cubic-bezier(0.3,1,0.4,1) both;
  }
  .fl svg .headG {
    animation: bloomHead 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .wilting { animation: wilt 0.6s ease-in both !important; }
  .spark {
    position: absolute;
    border-radius: 50%;
    animation: twinkle 1.4s ease-out both;
  }
  @keyframes growStem { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes bloomHead {
    0% { transform: scale(0); }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes wilt { to { transform: translateY(10px) scale(0.55); opacity: 0; } }
  @keyframes twinkle {
    0% { transform: scale(0); opacity: 0; }
    30% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.2) translateY(-26px); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .fl { animation: none; }
    .fl svg .stemG, .fl svg .headG { animation-duration: 0.01s; }
    .spark { animation-duration: 0.6s; }
  }
</style>
</head>
<body>
<div id="garden">
  <div id="hint">화면을 누르고 타이핑해 보세요<br />어딘가에 마법 주문이 숨어 있어요</div>
  <div id="textLayer" aria-live="polite"></div>
  <div id="meadowLayer"></div>
  <div id="flowerLayer"></div>
  <div id="sparkLayer"></div>
  <input id="hiddenInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="done" aria-label="타이핑 입력" />
</div>
<script>
(function(){
  const garden = document.getElementById('garden');
  const input = document.getElementById('hiddenInput');
  const textLayer = document.getElementById('textLayer');
  const flowerLayer = document.getElementById('flowerLayer');
  const meadowLayer = document.getElementById('meadowLayer');
  const sparkLayer = document.getElementById('sparkLayer');
  const hint = document.getElementById('hint');
  const SPELL = '꽃밭을 만드는 마법';
  const HIMMEL = '힘멜';
  const palettes = [
    { petal:'#ff8fb1', center:'#ffe066' }, { petal:'#ffd166', center:'#ff7b54' },
    { petal:'#c3a6ff', center:'#fff3b0' }, { petal:'#8ecae6', center:'#ffe066' },
    { petal:'#ffffff', center:'#ffd166' }, { petal:'#ff9770', center:'#fff3b0' },
    { petal:'#f9c74f', center:'#e07a5f' }, { petal:'#f4a7d3', center:'#fdf6c9' },
    { petal:'#e63946', center:'#ffe066' }, { petal:'#a8dadc', center:'#f4a261' }
  ];
  const himmelPalettes = [
    { petal:'#8ecae6', center:'#ffffff' }, { petal:'#a2d2ff', center:'#ffffff' },
    { petal:'#7fc8f8', center:'#ffffff' }, { petal:'#bde0fe', center:'#ffffff' },
    { petal:'#90dbf4', center:'#ffffff' }
  ];
  let prevLen = 0;
  let spellActive = false;
  let himmelActive = false;
  const flowers = [];
  const meadow = [];

  function pickPalette(){
    const pool = himmelActive ? himmelPalettes : palettes;
    return pool[Math.floor(Math.random()*pool.length)];
  }

  function viewportH(){
    return (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  }

  function render(){
    const v = input.value;
    textLayer.innerHTML = '';
    for (let i = 0; i < v.length; i++){
      const s = document.createElement('span');
      s.textContent = v[i];
      s.dataset.i = i;
      textLayer.appendChild(s);
    }
    const caret = document.createElement('span');
    caret.id = 'caret';
    textLayer.appendChild(caret);
    hint.style.opacity = v.length ? '0' : '1';
  }

  function makeFlowerSVG(p, scale, stemMin, stemVar){
    const petals = 5 + Math.floor(Math.random()*3);
    const r = (7 + Math.random()*4) * scale;
    const stemH = (stemMin + Math.random()*stemVar) * scale;
    const W = Math.ceil(44*scale), H = Math.ceil(stemH + r*2 + 8);
    const cx = W/2, headY = r + 3;
    let petalStr = '';
    for (let k = 0; k < petals; k++){
      const a = (k/petals) * Math.PI * 2;
      const px = (cx+Math.cos(a)*r*0.75).toFixed(1), py = (headY+Math.sin(a)*r*0.75).toFixed(1);
      petalStr += '<ellipse cx="'+px+'" cy="'+py+'" rx="'+(r*0.62).toFixed(1)+'" ry="'+(r*0.42).toFixed(1)+'" transform="rotate('+(a*180/Math.PI).toFixed(0)+' '+px+' '+py+')" fill="'+p.petal+'"/>';
    }
    const bend = (Math.random()*16-8).toFixed(1);
    return { W, H, html:
      '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block; overflow:visible;">' +
      '<g class="stemG">' +
      '<path d="M'+cx+' '+H+' Q '+(cx+ +bend)+' '+(H-stemH*0.6).toFixed(1)+' '+cx+' '+(headY+r*0.4).toFixed(1)+'" fill="none" stroke="#5fa860" stroke-width="'+(2.4*scale).toFixed(1)+'" stroke-linecap="round"/>' +
      '<ellipse cx="'+(cx-5*scale).toFixed(1)+'" cy="'+(H-stemH*0.45).toFixed(1)+'" rx="'+(5*scale).toFixed(1)+'" ry="'+(2.4*scale).toFixed(1)+'" transform="rotate(-35 '+(cx-5*scale).toFixed(1)+' '+(H-stemH*0.45).toFixed(1)+')" fill="#6db56e"/>' +
      '</g>' +
      '<g class="headG" style="transform-origin:'+cx+'px '+headY+'px;">' +
      petalStr +
      '<circle cx="'+cx+'" cy="'+headY+'" r="'+(r*0.42).toFixed(1)+'" fill="'+p.center+'"/>' +
      '</g></svg>' };
  }

  function setDelays(el, growDur, delay){
    const stem = el.querySelector('.stemG');
    const head = el.querySelector('.headG');
    stem.style.animationDuration = growDur + 's';
    stem.style.animationDelay = delay + 's';
    head.style.animationDelay = (delay + growDur*0.55).toFixed(2) + 's';
  }

  function positionFlower(f){
    const span = textLayer.querySelector('span[data-i="'+f.charIndex+'"]');
    if (!span) return false;
    const sr = span.getBoundingClientRect();
    const gr = garden.getBoundingClientRect();
    const fontBottom = sr.top - gr.top + sr.height*0.55;
    f.el.style.left = (sr.left - gr.left + sr.width*f.offsetRatio - f.W/2) + 'px';
    f.el.style.top = (fontBottom - f.H) + 'px';
    return true;
  }

  function spawnFlower(charIndex, delay){
    const span = textLayer.querySelector('span[data-i="'+charIndex+'"]');
    if (!span || span.textContent.trim() === '') return;
    const count = 1 + (Math.random() < 0.4 ? 1 : 0);
    for (let c = 0; c < count; c++){
      const p = pickPalette();
      const sv = makeFlowerSVG(p, 0.9, 22, 22);
      const el = document.createElement('div');
      el.className = 'fl';
      el.style.animationDelay = (Math.random()*2).toFixed(2)+'s';
      el.innerHTML = sv.html;
      setDelays(el, 0.45 + Math.random()*0.3, (delay || 0) + Math.random()*0.1);
      const f = { el, charIndex, W: sv.W, H: sv.H, offsetRatio: 0.15 + Math.random()*0.7 };
      flowerLayer.appendChild(el);
      flowers.push(f);
      positionFlower(f);
    }
  }

  function spawnSparks(){
    const gw = garden.clientWidth, gh = viewportH();
    const colors = himmelActive
      ? ['#e3f2fd','#bde0fe','#ffffff','#a2d2ff']
      : ['#fff3b0','#ffe066','#ffffff','#ffd6e8'];
    for (let i = 0; i < 30; i++){
      const s = document.createElement('div');
      s.className = 'spark';
      const sz = 3 + Math.random()*4;
      s.style.width = sz+'px'; s.style.height = sz+'px';
      s.style.background = colors[Math.floor(Math.random()*colors.length)];
      s.style.left = (Math.random()*gw)+'px';
      s.style.top = (gh*0.25 + Math.random()*gh*0.7)+'px';
      s.style.animationDelay = (Math.random()*1.6).toFixed(2)+'s';
      sparkLayer.appendChild(s);
      setTimeout(function(){ s.remove(); }, 3400);
    }
  }

  function castMeadow(){
    const gw = garden.clientWidth;
    const gh = viewportH();
    const count = Math.max(30, Math.floor(gw/12));
    for (let i = 0; i < count; i++){
      const p = pickPalette();
      const depth = Math.random();
      const scale = 0.65 + depth*0.95;
      const sv = makeFlowerSVG(p, scale, 24, 48);
      const el = document.createElement('div');
      el.className = 'fl';
      el.style.animationDelay = (Math.random()*3).toFixed(2)+'s';
      el.style.animationDuration = (3 + Math.random()*2).toFixed(2)+'s';
      el.innerHTML = sv.html;
      const x = Math.random()*gw - sv.W/2;
      const bottomJitter = (window.innerHeight - gh) + 4 + (1-depth)*36 + Math.random()*10;
      el.style.left = x+'px';
      el.style.bottom = bottomJitter+'px';
      el.style.zIndex = depth > 0.5 ? 2 : 1;
      const delay = (x/gw)*0.9 + Math.random()*0.5;
      setDelays(el, 0.5 + Math.random()*0.4, delay);
      meadowLayer.appendChild(el);
      meadow.push(el);
    }
    spawnSparks();
  }

  function bloomExistingText(){
    const v = input.value;
    for (let i = 0; i < v.length; i++){
      if (v[i].trim() === '') continue;
      spawnFlower(i, (i / Math.max(v.length,1)) * 0.9 + Math.random()*0.2);
    }
  }

  function wiltAll(){
    while (meadow.length){
      const el = meadow.pop();
      el.style.animationDelay = (Math.random()*0.4).toFixed(2)+'s';
      el.classList.add('wilting');
      setTimeout(function(){ el.remove(); }, 1100);
    }
    while (flowers.length){
      const f = flowers.pop();
      f.el.style.animationDelay = (Math.random()*0.4).toFixed(2)+'s';
      f.el.classList.add('wilting');
      setTimeout(function(){ f.el.remove(); }, 1100);
    }
  }

  function repositionAll(){
    for (let i = flowers.length - 1; i >= 0; i--){
      const f = flowers[i];
      if (!positionFlower(f)){
        f.el.classList.add('wilting');
        (function(el){ setTimeout(function(){ el.remove(); }, 650); })(f.el);
        flowers.splice(i, 1);
      }
    }
  }

  function adjustForKeyboard(){
    const vh = viewportH();
    const full = window.innerHeight;
    if (full - vh > 120){
      textLayer.style.top = Math.round(vh * 0.42) + 'px';
      textLayer.style.transform = 'translateY(-50%)';
    } else {
      textLayer.style.top = '40%';
      textLayer.style.transform = 'translateY(-50%)';
    }
    if (spellActive) repositionAll();
  }

  input.addEventListener('input', function(){
    const v = input.value;
    render();
    const hasSpell = v.indexOf(SPELL) !== -1;
    const hasHimmel = v.indexOf(HIMMEL) !== -1;
    const himmelChanged = hasHimmel !== himmelActive;
    himmelActive = hasHimmel;
    if (hasSpell && !spellActive){
      spellActive = true;
      castMeadow();
      bloomExistingText();
    } else if (!hasSpell && spellActive){
      spellActive = false;
      wiltAll();
    } else if (spellActive && himmelChanged){
      wiltAll();
      setTimeout(function(){
        if (!spellActive) return;
        castMeadow();
        bloomExistingText();
      }, 700);
    } else if (spellActive){
      if (v.length > prevLen){
        for (let i = prevLen; i < v.length; i++) spawnFlower(i, 0);
      } else if (v.length === prevLen && v.length > 0){
        if (Math.random() < 0.5) spawnFlower(v.length - 1, 0);
      }
      repositionAll();
    }
    prevLen = v.length;
  });

  function focusInput(){
    input.focus({ preventScroll: true });
  }
  garden.addEventListener('pointerdown', function(e){
    e.preventDefault();
    focusInput();
  });
  garden.addEventListener('click', focusInput);

  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', adjustForKeyboard);
  }
  window.addEventListener('resize', function(){ if (spellActive) repositionAll(); });

  render();
  setTimeout(focusInput, 300);
})();
</script>
</body>
</html>
